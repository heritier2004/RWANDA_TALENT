<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rwanda Football Academy - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Gukoresha ya style yawe y'amabara (Gradient Animation) */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 25%, #1a472a 50%, #2d5a3f 75%, #1a472a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Navbar Section */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .btn-nav-login {
            background: #fff;
            color: #1a472a !important;
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Button ya Login nini */
        .btn-main {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        /* Footer */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">
            <i class="fas fa-futbol"></i> FERWAFA Connect
        </div>
        <div class="nav-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="login.html" class="btn-nav-login">Login</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Building the Future of <br>Rwandan Football</h1>
        <p>Manage academies, track players, and discover talent using our professional management system.</p>

        <a href="login.html" class="btn-main">Get Started <i class="fas fa-arrow-right"></i></a>
    </div>

    <footer>
        &copy; 2024 Rwanda Football Academy Management System. All rights reserved.
    </footer>

</body>

</html>
