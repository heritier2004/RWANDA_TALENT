<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rwanda Football Academy - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-page">
        <div class="login-form-container">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-futbol"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <div id="loginError" class="login-error" style="display: none;"></div>

                <button type="submit" class="btn-login">Secure Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 24px;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Pre-load the main configuration -->
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.querySelector('.btn-login');
            
            try {
                btn.textContent = 'Authenticating...';
                btn.disabled = true;
                errorDiv.style.display = 'none';

                // We use standard fetch here to bypass checkAuth loop, but utilizing API_BASE from main.js
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save token and user data
                    localStorage.setItem('token', data.access_token || data.token);
                    if(data.access_token) localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user || { role: data.role || 'club' }));
                    
                    // Route to correct dashboard based on role
                    const role = (data.user?.role || data.role || 'club').toLowerCase();
                    
                    if (role === 'superadmin') window.location.href = 'superadmin.html';
                    else if (role === 'ferwafa') window.location.href = 'ferwafa.html';
                    else if (role === 'scout') window.location.href = 'scout.html';
                    else if (role === 'school') window.location.href = 'school.html';
                    else if (role === 'academy') window.location.href = 'academy.html';
                    else window.location.href = 'club.html';
                } else {
                    errorDiv.textContent = data.error || data.message || 'Invalid username or password';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Server connection failed. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
