<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Dashboard - Football Academy Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-search"></i>
                </div>
                <h2>Talent Scout</h2>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="scout.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="#talent"><i class="fas fa-star"></i> Find Talent</a></li>
                    <li><a href="#reports"><i class="fas fa-file-alt"></i> Reports</a></li>
                    <li><a href="#favorites"><i class="fas fa-heart"></i> Favorites</a></li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-details">
                        <span id="userName">Scout</span>
                        <span class="badge role-scout">Scout</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Talent Scout Dashboard</h1>
                <div class="header-actions">
                    <div class="scout-badge">
                        <i class="fas fa-search"></i> Talent Scout
                    </div>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Scout Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Players Viewed</h3>
                            <p class="stat-number" id="playersViewed">0</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon active">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Favorites</h3>
                            <p class="stat-number" id="favorites">0</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon success">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Reports</h3>
                            <p class="stat-number" id="reports">0</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon warning">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Matches Attended</h3>
                            <p class="stat-number" id="matchesAttended">0</p>
                        </div>
                    </div>
                </div>
                
                <!-- Talent Search -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-search"></i> Find Talent</h3>
                    </div>
                    <div class="card-body">
                        <div class="search-filters">
                            <div class="filter-group">
                                <label>Position</label>
                                <select id="filterPosition">
                                    <option value="">All Positions</option>
                                    <option value="Goalkeeper">Goalkeeper</option>
                                    <option value="Defender">Defender</option>
                                    <option value="Midfielder">Midfielder</option>
                                    <option value="Forward">Forward</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Nationality</label>
                                <select id="filterNationality">
                                    <option value="">All</option>
                                    <option value="Rwandan">Rwandan</option>
                                    <option value="Kenyan">Kenyan</option>
                                    <option value="Ugandan">Ugandan</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Age Range</label>
                                <select id="filterAge">
                                    <option value="">All Ages</option>
                                    <option value="15-18">15-18</option>
                                    <option value="18-21">18-21</option>
                                    <option value="21-25">21-25</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" onclick="searchPlayers()">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                        
                        <div class="table-responsive">
                            <table class="data-table" id="talentTable">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Position</th>
                                        <th>Age</th>
                                        <th>Nationality</th>
                                        <th>Entity</th>
                                        <th>Goals</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="talentTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- Top Performers -->
                <div class="content-grid">
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-trophy"></i> Top Scorers</h3>
                        </div>
                        <div class="card-body">
                            <div class="top-performers" id="topScorers"></div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-star"></i> Top Assists</h3>
                        </div>
                        <div class="card-body">
                            <div class="top-performers" id="topAssists"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadTopPerformers();
            loadAllPlayers();
        });
    </script>
</body>
</html>
